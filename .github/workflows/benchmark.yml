name: Benchmark

on:
  pull_request:
    paths-ignore:
      - '.github/**'
  workflow_dispatch:
    inputs:
      base-ref:
        description: 'Base ref to compare against (branch, tag, or SHA)'
        required: true
        default: 'main'

permissions:
  actions: read
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    uses: microsoft/go-infra/.github/workflows/benchmark.yml@eae52708dd530100eb695850bfc7f994dd9340d3 # v0.0.14
    permissions:
      actions: read
      contents: read
      pull-requests: write
    with:
      default-base-ref: main
      dispatch-base-ref: ${{ inputs.base-ref }}
      matrix: |
        {
          "runs-on": ["ubuntu-22.04", "ubuntu-24.04-arm"],
          "go-version": ["1.25", "1.26"],
          "openssl-version": ["3.0.13", "3.1.5", "3.2.1", "3.3.1", "3.4.0", "3.5.0"],
          "cgo-enabled": ["1"],
          "include": [
            { "runs-on": "ubuntu-latest", "go-version": "1.25", "cgo-enabled": "1", "container": "mcr.microsoft.com/oss/go/microsoft/golang:1.25-azurelinux3.0", "container-label": "azl3", "container-setup": "tdnf install -y openssl-devel" },
            { "runs-on": "ubuntu-latest", "go-version": "1.26", "cgo-enabled": "1", "container": "mcr.microsoft.com/oss/go/microsoft/golang:1.25-azurelinux3.0", "container-label": "azl3", "container-setup": "tdnf install -y openssl-devel" }
          ]
        }
