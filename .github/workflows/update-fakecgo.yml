name: Update fakecgo dependencies

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: v2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          go-download-base-url: "https://aka.ms/golang/release/latest"

      - name: Check current lock file
        id: check-current
        run: |
          if [ -f internal/fakecgo/fakecgo.lock ]; then
            echo "current_hash=$(jq -r .commit_hash internal/fakecgo/fakecgo.lock)" >> $GITHUB_OUTPUT
          else
            echo "current_hash=" >> $GITHUB_OUTPUT
          fi

      - name: Delete lock file to fetch latest
        run: rm -f internal/fakecgo/fakecgo.lock

      - name: Run go generate
        run: go generate ./internal/fakecgo/
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Check new lock file
        id: check-new
        run: |
          echo "new_hash=$(jq -r .commit_hash internal/fakecgo/fakecgo.lock)" >> $GITHUB_OUTPUT

      - name: Check for changes
        id: git-check
        run: git diff --exit-code -- . ':!internal/fakecgo/fakecgo.lock' || echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.git-check.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: 'chore: update fakecgo dependencies to ${{ steps.check-new.outputs.new_hash }}'
          title: 'chore: update fakecgo dependencies'
          body: |
            This PR updates the fakecgo dependencies from the upstream [ebitengine/purego](https://github.com/ebitengine/purego) repository.
            
            **Previous commit**: `${{ steps.check-current.outputs.current_hash }}`
            **New commit**: `${{ steps.check-new.outputs.new_hash }}`
            
            Changes: https://github.com/ebitengine/purego/compare/${{ steps.check-current.outputs.current_hash }}...${{ steps.check-new.outputs.new_hash }}
            
            This PR was automatically created by the [update-fakecgo workflow](.github/workflows/update-fakecgo.yml).
          branch: update-fakecgo-dependencies
          delete-branch: true
