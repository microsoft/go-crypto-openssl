on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

name: Check Vendored Imports
permissions:
   contents: read
jobs:
  check-imports:
    # Verify that packages vendored into Go's standard library only use
    # allowed stdlib imports. New imports require a matching update to the
    # deps_test.go patch in microsoft-go.
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod

    - name: Check vendored package imports
      run: |
        go run github.com/microsoft/go-infra/cmd/check-imports@v0.0.12 \
          -pkg ./internal/fakecgo \
          -allow '' \
          -pkg ./internal/ossl \
          -allow errors,unsafe \
          -pkg ./osslsetup \
          -allow errors,strconv,sync,syscall,unsafe \
          -pkg .
