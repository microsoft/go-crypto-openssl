on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MS_GO_NOSYSTEMCRYPTO: "1" # Don't use systemcrypto for testing parity with stdlib

name: Test
jobs:
  versionguardcheck:
    # Lint pass: enforce the //versionguardcheck:ignore convention. Runs once
    # (no OpenSSL matrix), since it's a pure-Go static analysis of the
    # backend source.
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
        go-download-base-url: "https://aka.ms/golang/release/latest"
    - name: Test analyzer
      run: go test ./cmd/versionguardcheck/...
    - name: Run analyzer on backend
      run: go run ./cmd/versionguardcheck .

  test:
    strategy:
      fail-fast: false
      matrix:
        go-version: [1.25, 1.26]
        openssl-version: [1.1.1, 3.0.1, 3.0.13, 3.1.5, 3.2.1, 3.3.0, 3.3.1, 3.4.0, 3.5.0, 3.5.6, 4.0.0]
        host: [ubuntu-22.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.host }}
    steps:
    - name: Install build tools
      run: sudo apt-get install -y build-essential
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: ${{ matrix.go-version }}
        go-download-base-url: "https://aka.ms/golang/release/latest"
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Verify go generate leaves no changes
      run: |
        go generate ./...
        git diff --exit-code
    - name: Install OpenSSL
      run: sudo sh ./scripts/openssl.sh ${{ matrix.openssl-version }}
    - name: Check headers
      working-directory: ./cmd/checkheader
      run: |
        go run . -include /usr/local/src/openssl-${{ matrix.openssl-version }}/include -shim ../../internal/ossl/shims.h
    - name: Set OpenSSL config and prove FIPS
      run: |
        sudo cp ./scripts/openssl-3.cnf /usr/local/ssl/openssl.cnf
        go test -v -count 0 ./openssl | grep -q "FIPS enabled: true"
      if: ${{ matrix.openssl-version == '3.0.1' }}
      env:
        GO_OPENSSL_VERSION_OVERRIDE: ${{ matrix.openssl-version }}
    - name: Run Test
      # Run each test 10 times so the garbage collector chimes in
      # and exercises the multiple finalizers we use.
      # This can detect use-after-free and double-free issues.
      run: go test -shuffle=on -gcflags=all=-d=checkptr -count 10 -v ./...
      env:
        GO_OPENSSL_VERSION_OVERRIDE: ${{ matrix.openssl-version }}
        CGO_ENABLED: 1
    - name: Run benchmarks (1x)
      run: go test -bench=./... -run='^$' -benchtime=1x ./...
      env:
        GO_OPENSSL_VERSION_OVERRIDE: ${{ matrix.openssl-version }}
        CGO_ENABLED: 1
    - name: Run Test CGO disabled
      run: go test -shuffle=on -count 10 -v ./...
      env:
        GO_OPENSSL_VERSION_OVERRIDE: ${{ matrix.openssl-version }}
        CGO_ENABLED: 0
    - name: Run Test CGO disabled and optimizations off
      run: go test -shuffle=on -count 10 -gcflags=all="-N -l" -v ./...
      env:
        GO_OPENSSL_VERSION_OVERRIDE: ${{ matrix.openssl-version }}
        CGO_ENABLED: 0
        GOFLAGS: -tags=noopt
    - name: Run Test with address sanitizer
      if: ${{ runner.arch == 'X64' }} # arm64 thread sanitizer is flaky, unrelated to this codebase
      run: |
        ok=true
        for t in $(go test ./... -list=. | grep '^Test'); do
          go test ./... -gcflags=all=-d=checkptr -asan -run ^$t$ -v || ok=false
        done
        $ok
      env:
        GO_OPENSSL_VERSION_OVERRIDE: ${{ matrix.openssl-version }}

  ossltest:
    strategy:
      fail-fast: false
      matrix:
        go-version: [1.25, 1.26]
        host: [
          # the non-intel macOS runners use ARM64
          {os: macos-15-intel, openssl-version: /usr/local/opt/openssl@3/lib/libcrypto.3.dylib},
          {os: macos-15, openssl-version: /opt/homebrew/opt/openssl@3/lib/libcrypto.3.dylib},
          {os: windows-2022, openssl-version: libcrypto-3-x64.dll}
        ]
    runs-on: ${{ matrix.host.os }}
    steps:
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: ${{ matrix.go-version }}
        go-download-base-url: "https://aka.ms/golang/release/latest"
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Run Test
      run: go test -shuffle=on -gcflags=all=-d=checkptr -count 10 -v ./...
      env:
        GO_OPENSSL_VERSION_OVERRIDE: ${{ matrix.host.openssl-version }}
        CGO_ENABLED: 1
    - name: Run benchmarks (1x)
      run: go test -bench=./... -run='^$' -benchtime=1x ./...
      env:
        GO_OPENSSL_VERSION_OVERRIDE: ${{ matrix.host.openssl-version }}
        CGO_ENABLED: 1
    - name: Run Test CGO disabled
      run: go test -shuffle=on -count 10 -v ./...
      env:
        GO_OPENSSL_VERSION_OVERRIDE: ${{ matrix.host.openssl-version }}
        CGO_ENABLED: 0

  container:
    strategy:
      fail-fast: false
      matrix:
        image: [
          mcr.microsoft.com/oss/go/microsoft/golang:1.25-azurelinux3.0,
          mcr.microsoft.com/oss/go/microsoft/golang:1.25-cbl-mariner2.0,
          fedora:latest,
        ]
    runs-on: ubuntu-latest
    container: ${{ matrix.image }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Install required packages
      if: startsWith(matrix.image, 'fedora')
      run: |
          dnf install -y golang
    - name: Run Test
      run: go test -shuffle=on -v ./...
      env:
        CGO_ENABLED: 1
        MS_GO_NOSYSTEMCRYPTO: 1 # Avoid duplicated symbol errors when running the MS toolchain
    - name: Run benchmarks (1x)
      run: go test -bench=./... -run='^$' -benchtime=1x ./...
      env:
        CGO_ENABLED: 1
        MS_GO_NOSYSTEMCRYPTO: 1
    - name: Run Test CGO disabled
      run: go test -shuffle=on -v ./...
      env:
        CGO_ENABLED: 0
        MS_GO_NOSYSTEMCRYPTO: 1

  test-qemu:
    runs-on: ${{ matrix.architecture == 'arm/v7' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    strategy:
      fail-fast: false
      matrix:
        go-version: [1.25, 1.26]
        architecture: [386, arm/v7, loong64, ppc64le, s390x, riscv64]
        cgo: [1, 0]
        exclude:
          - architecture: s390x
            cgo: 0
        include:
          # s390x CGOless only works with Go tip, which has a fix for a linker issue that causes the build to fail.
          - architecture: s390x
            go-version: tip
            cgo: 0
    steps:
    - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      if: ${{ matrix.architecture != 'loong64' }}
    - name: Setup qemu for Loong64
      if: ${{ matrix.architecture == 'loong64' }}
      run: docker run --privileged --rm tonistiigi/binfmt --install all
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Run tests on ${{matrix.architecture}}
      run: |
        if [ "${{matrix.architecture}}" = "loong64" ]; then
          IMAGE="ghcr.io/loong64/golang:${{ matrix.go-version }}-trixie"
        else
          IMAGE="golang:${{ matrix.go-version }}"
        fi
        docker run --rm --platform linux/${{matrix.architecture}} \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          -e CGO_ENABLED=${{ matrix.cgo }} \
          "$IMAGE" \
          bash -c "
            # Add required dynamic linker symlink (if applicable)
            case ${{matrix.architecture}} in
              arm/v7)
                ln -sf /usr/lib/ld-linux-armhf.so.3 /lib/ld-linux.so.3
                ;;
              riscv64)
                ln -sf /usr/lib/riscv64-linux-gnu/ld-linux-riscv64-lp64d.so.1 /lib/ld.so.1 ;;
              s390x)
                mkdir -p /lib64
                ln -sf /usr/lib/s390x-linux-gnu/ld64.so.1 /lib64/ld64.so.1
                ;;
            esac
            # TODO: Remove -checklinkname=0 once go tip no longer requires it.
            LDFLAGS=''
            if [ '${{ matrix.go-version }}' = 'tip' ]; then
              LDFLAGS='-ldflags=-checklinkname=0'
            fi
            go test -shuffle=on -count 3 \$LDFLAGS -v ./...
            go test -bench=./... -run='^$' -benchtime=1x \$LDFLAGS ./...
          "

  freebsd:
    strategy:
      matrix:
        go: ['1.25.0', '1.26.0']
        cgo: [1, 0]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Run tests on FreeBSD
      uses: vmactions/freebsd-vm@d1e65811565151536c0c894fff74f06351ed26e6 # v1.4.5
      with:
        prepare: |
          fetch https://go.dev/dl/go${{matrix.go}}.freebsd-amd64.tar.gz
          rm -rf /usr/local/go && tar -C /usr/local -xf go${{matrix.go}}.freebsd-amd64.tar.gz
        run: |
          GCFLAGS=""
          if [ "${{ matrix.cgo }}" = "0" ]; then
            GCFLAGS="-gcflags=github.com/microsoft/go-crypto-openssl/internal/fakecgo=-std"
          fi
          CGO_ENABLED=${{ matrix.cgo }} /usr/local/go/bin/go test -shuffle=on -count 3 $GCFLAGS -v ./...
          CGO_ENABLED=${{ matrix.cgo }} /usr/local/go/bin/go test -bench=. -run='^$' -benchtime=1x $GCFLAGS ./...

  # Verify that golang-fips/openssl builds successfully without cgo enabled
  # on a platform where cgoless execution is not supported.
  #
  # A project can avoid attempting to build the openssl package by only
  # importing it from Go files with a cgo build tag. However, this isn't always
  # reasonable. In that case, we can help by making sure the openssl package
  # builds successfully even without cgo.
  #
  # For example, the Microsoft build of Go compiles this module without cgo when
  # running a cross-platform build.
  #
  # The golang-fips/openssl module can't do any crypto when built without cgo,
  # but it exports a few simple functions and types.
  cgolessbuild:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Run Build
      run: CGO_ENABLED=0 GOOS=windows GOARCH=386 go build ./...

  conclusion:
    needs: [versionguardcheck, test, ossltest, container, test-qemu, freebsd, cgolessbuild]
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Result
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" || "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more jobs failed or were cancelled."
            exit 1
          fi
          echo "All jobs passed."
